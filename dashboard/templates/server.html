<!DOCTYPE html>
<html>
<head>
<title>Server</title>

<style>
body{
background:#020617;
color:white;
font-family:Inter;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>⚙️ Server Panel</h1>

<form method="POST">

<div class="card">
<h3>Prefix</h3>
<input type="text" name="prefix" value="{{ settings.prefix }}">
</div>

<div class="card">
<h3>Modules</h3>

<label>Fun</label>
<input type="checkbox" name="fun" {% if settings.fun %}checked{% endif %}><br>

<label>Moderation</label>
<input type="checkbox" name="moderation" {% if settings.moderation %}checked{% endif %}>
</div>

<button>Save</button>

</form>

</body>
</html>
