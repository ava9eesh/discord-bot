<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
}

.logo{
font-weight:900;
font-size:22px;
background:linear-gradient(90deg,#3b82f6,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:10px 18px;
border-radius:12px;
background:linear-gradient(90deg,#3b82f6,#a855f7);
color:white;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#3b82f6,#a855f7,#ec4899);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:15px;
color:#94a3b8;
}

.cta{
margin-top:30px;
display:flex;
gap:10px;
justify-content:center;
}

/* FEATURES */
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
border:1px solid #3b82f6;
}
</style>
</head>

<body>

<nav>
<div class="logo">🤖 Bot</div>

<div>
<a href="/login" class="btn">Login</a>
<a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&scope=bot%20applications.commands" class="btn">Invite</a>
</div>
</nav>

<section class="hero">
<h1>Control Your Server</h1>
<p>Moderation • Games • Dashboard</p>

<div class="cta">
<a href="/login" class="btn">Dashboard</a>
</div>
</section>

<section class="features">
<div class="card"><h3>⚙️ Control</h3><p>Manage everything</p></div>
<div class="card"><h3>🎮 Games</h3><p>Fun commands</p></div>
<div class="card"><h3>🔨 Moderation</h3><p>Full power</p></div>
<div class="card"><h3>📊 Dashboard</h3><p>Clean UI</p></div>
</section>

</body>
</html>
