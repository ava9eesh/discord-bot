<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discord Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    nav {
      display:flex;
      justify-content:space-between;
      padding:20px 60px;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size:24px;
      font-weight:900;
      background:linear-gradient(90deg,#3b82f6,#a855f7);
      -webkit-background-clip:text;
      color:transparent;
    }

    .nav-buttons {
      display:flex;
      gap:10px;
    }

    .btn {
      background:linear-gradient(90deg,#3b82f6,#a855f7);
      padding:10px 20px;
      border-radius:12px;
      text-decoration:none;
      color:white;
      font-weight:600;
      transition:.2s;
    }

    .btn:hover { transform:scale(1.05); }

    .hero {
      text-align:center;
      padding:120px 20px;
    }

    .hero h1 {
      font-size:60px;
      font-weight:900;
      background:linear-gradient(90deg,#3b82f6,#a855f7,#ec4899);
      -webkit-background-clip:text;
      color:transparent;
    }

    .hero p {
      margin-top:20px;
      color:#94a3b8;
      font-size:18px;
    }

    .cta {
      margin-top:40px;
      display:flex;
      justify-content:center;
      gap:15px;
    }

  </style>
</head>
<body>

<nav>
  <div class="logo">🤖 Bot Dashboard</div>

  <div class="nav-buttons">
    <a href="/login" class="btn">Login</a>

    <a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&integration_type=0&scope=applications.commands+bot"
       class="btn">
       Invite Bot 🚀
    </a>
  </div>
</nav>

<section class="hero">
  <h1>Ultimate Discord Bot</h1>
  <p>Moderation • Games • Tickets • Everything you need</p>

  <div class="cta">
    <a href="/login" class="btn">Login</a>

    <a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&integration_type=0&scope=applications.commands+bot"
       class="btn">
       Invite Bot 🤖
    </a>
  </div>
</section>

</body>
</html>
