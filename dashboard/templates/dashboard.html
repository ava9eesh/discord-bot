<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#0f172a;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:10px;
color:#94a3b8;
text-decoration:none;
border-radius:10px;
}

.sidebar a:hover{
background:#3b82f6;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#3b82f6;
border-radius:10px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<a href="#">Home</a>
<a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&scope=bot%20applications.commands">Invite</a>
</div>

<div class="main">

<h2>🟢 Manage</h2>
<div class="grid">
{% for g in managed %}
<div class="card">
<h3>{{ g.name }}</h3>
<a href="/server/{{ g.id }}" class="btn">Manage</a>
</div>
{% endfor %}
</div>

<h2>➕ Invite</h2>
<div class="grid">
{% for g in invite %}
<div class="card">
<h3>{{ g.name }}</h3>
<a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&scope=bot%20applications.commands" class="btn">Invite</a>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
