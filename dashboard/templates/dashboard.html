<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  height:100vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:25px;
}

.sidebar h2 {
  font-size:22px;
  margin-bottom:30px;
  font-weight:800;
  background:linear-gradient(90deg,#3b82f6,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
}

.nav a {
  display:block;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  color:#cbd5f5;
  margin-bottom:10px;
  transition:.2s;
}

.nav a:hover {
  background:#3b82f6;
  color:white;
}

/* MAIN */
.main {
  flex:1;
  padding:40px;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.user {
  font-weight:600;
}

/* CARDS */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  transition:.3s;
  backdrop-filter:blur(20px);
}

.card:hover {
  transform:translateY(-8px);
  border:1px solid #3b82f6;
}

.card h3 {
  margin-bottom:10px;
}

.btn {
  display:inline-block;
  margin-top:10px;
  padding:8px 14px;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#a855f7);
  color:white;
  text-decoration:none;
  font-size:14px;
}

.section-title {
  margin:30px 0 15px;
  font-size:20px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🤖 Dashboard</h2>
  <div class="nav">
    <a href="#">🏠 Home</a>
    <a href="#">⚙️ Settings</a>
    <a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&integration_type=0&scope=applications.commands+bot">➕ Invite Bot</a>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <h1>Servers</h1>
    <div class="user">{{ user.username }}</div>
  </div>

  <div class="section-title">🟢 Manage Servers</div>
  <div class="grid">
    {% for g in managed %}
    <div class="card">
      <h3>{{ g.name }}</h3>
      <a href="/server/{{ g.id }}" class="btn">Manage</a>
    </div>
    {% endfor %}
  </div>

  <div class="section-title">➕ Invite Bot</div>
  <div class="grid">
    {% for g in invite %}
    <div class="card">
      <h3>{{ g.name }}</h3>
      <a href="https://discord.com/oauth2/authorize?client_id=1493636740768993361&permissions=8&integration_type=0&scope=applications.commands+bot" class="btn">
        Invite
      </a>
    </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
